search_mode = "fuzzy"
filter_mode = "global"
filter_mode_shell_up_key_binding = "host"
search_mode_shell_up_key_binding = "fuzzy"
workspaces = true
style = "compact"
invert = true
show_preview = true
max_preview_height = 4
show_help = true
show_tabs = true
auto_hide_height = 8
enter_accept = true
command_chaining = true
show_numeric_shortcuts = true
inline_height = 0

[search]
filters = ["global", "host", "session", "workspace", "directory"]

[ui]
columns = ["duration", "time", "command"]

[preview]
strategy = "auto"

keymap_mode = "vim-insert"
keymap_cursor = { emacs = "blink-block", vim_insert = "blink-bar", vim_normal = "steady-block" }

[keys]
scroll_exits = true
"ctrl-j" = "history_list_next"
"ctrl-k" = "history_list_prev"

dialect = "uk"
timezone = "local"
secrets_filter = true
exit_mode = "return-original"
history_format = "{time}\t{command}\t{duration}"

history_filter = [
  "^secret-cmd",
  "^export\\s+(AWS_|GITHUB_|STRIPE_|OPENAI_|ANTHROPIC_)",
  "^ssh-add\\s",
  "password",
  "token",
  "^cd(\\s|$)",
  "^ls(\\s|$)",
  "^la(\\s|$)",
  "^ll(\\s|$)",
  "^z(\\s|$)",
  "^pwd$",
  "^clear$",
  "^exit$",
  "^y(\\s|$)"
]

[stats]
common_subcommands = [
  "brew",
  "bun",
  "cargo",
  "docker",
  "git",
  "gh",
  "go",
  "kubectl",
  "npm",
  "npx",
  "tmux",
  "yabai",
  "skhd",
]

common_prefix = ["sudo"]

ignored_commands = [
  "cd",
  "z",
  "ls",
  "la",
  "ll",
  "clear",
  "exit",
  "pwd",
  "y",
]

sync_frequency = "0"
auto_sync = true
update_check = true

[sync]
records = true

[daemon]
enabled = false

[tmux]
enabled = false

[theme]
name = "catppuccin-mocha-mauve"

network_connect_timeout = 5
network_timeout = 5
local_timeout = 5
