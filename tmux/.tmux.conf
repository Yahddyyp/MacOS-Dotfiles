# Prefix
set -g prefix C-a

# General
set -g set-clipboard on
set -g mouse on
set -g status-position top
set -g default-terminal "tmux-256color"
set -g set-titles-string "#S:#I.#P"
set -g allow-rename off
set -g automatic-rename off
set -g base-index 1
set -g renumber-windows on 
setw -g pane-base-index 1
setw -g mode-keys vi 

# Key bindings
bind r source-file ~/.tmux.conf
bind-key x kill-pane
bind-key Q confirm-before -p "Kill tmux server? (y/n)" kill-server
bind-key m split-window -v
bind-key u split-window -h
bind-key Tab last-window
unbind l

# Sesh session switcher
bind-key "T" run-shell "sesh connect \"$( \
  sesh list --icons | fzf-tmux -p 80%,85% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --color 'bg:#1e1e2e,bg+:#313244,fg:#cdd6f4,fg+:#cdd6f4,border:#313244,label:#cdd6f4,header:#f38ba8,prompt:#cba6f7,pointer:#f5e0dc,marker:#b4befe,spinner:#f5e0dc,info:#cba6f7' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill ^e rename ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔍  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-e:execute(~/.tmux-scripts/tmux-rename-session {2..})+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}' \
)\""
bind -N "last-session (via sesh)" j run-shell "sesh last"
bind-key C-e run-shell "tmux display-popup -E -b none -w 80% -h 85% '~/.tmux-scripts/tmux-rename-session #S'"
bind-key C-w run-shell "tmux display-popup -E -b none -w 80% -h 85% '~/.tmux-scripts/tmux-rename-window'"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/tmux-floax'

# Plugin settings
set -g @floax-bind 'g'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#cba6f7'
set -g @floax-text-color '#cdd6f4'
set -g @floax-change-path 'true'

# Smart pane switching with awareness of Vim and Atuin
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf|atuin)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

bind C-l send-keys 'C-l'

# Catppuccin (must be set before TPM initializes plugins)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background "default"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_window_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag, 󰁌,}"
set -g @catppuccin_window_current_number_color "#7dc4e4"
set -g @catppuccin_session_text " #{s|.*/||:session_name}"
set -g @catppuccin_window_number_color "#{E:@thm_mauve}"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_directory_text " #{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}}"

# Status module settings for "pill" style
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Initialize TPM (must come before plugin run commands)
run '~/.tmux/plugins/tpm/tpm'

# Status bar
set -g status 2
set -g status-format[1] ""
set -g status-justify left
set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session} "
set -g status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"

run '~/.tmux/plugins/tmux/catppuccin.tmux'
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.tmux/plugins/tmux-battery/battery.tmux'

set -g status-bg default
set -g status-style bg=default
